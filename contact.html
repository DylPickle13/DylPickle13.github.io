<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EnGem | Contact</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <canvas id="canvas-bg"></canvas>
    <div class="bg-glow"></div>
    <div id="cursor-glow"></div>
    <div class="noise-overlay"></div>
    
    <nav class="navbar"><div class="nav-container"><a href="index.html" class="logo">EnGem<span>.</span></a><ul class="nav-links"><li><a href="index.html">Home</a></li><li><a href="features.html">Features</a></li><li><a href="projects.html">Projects</a></li><li><a href="docs.html">Docs</a></li><li><a href="contact.html" class="active">Contact</a></li></ul></div></nav>
    
    <section class="container">
        <div class="contact-wrapper">
            <div class="contact-form reveal">
                <div class="contact-header">
                    <h3>Get in Touch</h3>
                    <p>Contact the EnGem development team directly at <br> <a href="mailto:test@gmail.com">test@gmail.com</a></p>
                </div>
                
                <form action="#" method="POST" onsubmit="event.preventDefault(); alert('Message sending via EnGem network is under construction. Please use the direct email above.');">
                    <div class="form-group">
                        <label for="name">Name</label>
                        <input type="text" id="name" class="form-control" placeholder="Enter your name" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="email">Email</label>
                        <input type="email" id="email" class="form-control" placeholder="Enter your email" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="message">Message</label>
                        <textarea id="message" class="form-control" placeholder="Enter your message..." required></textarea>
                    </div>
                    
                    <button type="submit" class="submit-btn">Initialize Transmission</button>
                </form>
            </div>
        </div>
    </section>

    <script src="js/main.js"></script>
</body>
</html>
