<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>EnGem | Contact</title>
<link href="css/style.css" rel="stylesheet"/>
</head>
<body>
<canvas id="canvas-bg"></canvas>
<div class="bg-glow"></div>
<div id="cursor-glow"></div>
<div class="noise-overlay"></div>
<nav class="navbar"><div class="nav-container"><a class="logo" href="index.html">EnGem<span>.</span></a><ul class="nav-links"><li><a href="index.html">Home</a></li><li><a href="features.html">Features</a></li><li><a href="projects.html">Projects</a></li><li><a href="docs.html">Docs</a></li><li><a class="active" href="contact.html">Contact</a></li></ul></div></nav>
<section class="container">
<div class="contact-wrapper">
<div class="contact-form reveal">
<div class="contact-header">
<h3>Get in Touch</h3>
<p>Contact the EnGem development team directly at <br/> <a href="mailto:test@gmail.com">test@gmail.com</a></p>
</div>
<form action="#" method="POST" onsubmit="event.preventDefault(); alert('Message sending via EnGem network is under construction. Please use the direct email above.');">
<div class="form-group">
<label for="name">Name</label>
<input class="form-control glass-input" id="name" placeholder="Enter your name" required="" type="text"/>
</div>
<div class="form-group">
<label for="email">Email</label>
<input class="form-control glass-input" id="email" placeholder="Enter your email" required="" type="email"/>
</div>
<div class="form-group">
<label for="message">Message</label>
<textarea class="form-control glass-input" id="message" placeholder="Enter your message..." required=""></textarea>
</div>
<button class="submit-btn" type="submit">Initialize Transmission</button>
</form>
</div>
</div>
</section>
<script src="js/main.js"></script>
</body>
</html>
